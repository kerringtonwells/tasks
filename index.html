<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Kwells: Productivity Booster</title>
    <link rel="stylesheet" href="css/tasksStyle.css">
</head>
<body>
    <!-- Left: Links sidebar -->
    <div class="container links-container">
        <h2>Useful Links</h2>
        <div class="links-toolbar">
            <button id="addLink">Add Link</button>
            <button id="exportLinks">Export Links</button>
            <button id="importLinks">Import Links</button>
            <button id="toggleTheme">Toggle Theme</button>
        </div>
        <input type="file" id="importLinksFile" accept=".json" style="display:none">
        <ul id="linksList"></ul>
    </div>

    <!-- Center: Everything -->
    <div class="container" id="mainContainer">
        <h1>Productivity Booster</h1>

        <!-- Main content -->
        <div id="mainContent">
            <table>
                <thead><tr><th>Time Box</th></tr></thead>
                <tbody id="timeTable"></tbody>
            </table>

            <!-- Controls row: ▲ ▼ ✕ ⏱ 📋 ＋ ↑ -->
            <div class="controls-row">
                <button id="moveUp"        title="Move Up">▲</button>
                <button id="moveDown"      title="Move Down">▼</button>
                <button id="clearState"    title="Clear State">✕</button>
                <button id="stopwatchToggle" class="icon-btn" title="Stopwatch">⏱</button>
                <button id="showNotes"     class="icon-btn" title="Show Notes">📋</button>
                <button id="addTodoItem"   class="icon-btn" title="Add Task">＋</button>
                <button id="exportTodoList" class="icon-btn" title="Export To-Do List">↑</button>
            </div>

            <!-- Current time on its own row -->
            <div id="currentTimeRow">
                <div id="currentTime"></div>
            </div>

            <!-- Inline stopwatch -->
            <div id="inlineStopwatch" style="display:none">
                <div class="stopwatch">
                    <div class="time-display">
                        <span class="hours">00</span>:<span class="minutes">00</span>:<span class="seconds">00</span>:<span class="milliseconds">000</span>
                    </div>
                    <div class="buttons">
                        <button id="startBtn">Start</button>
                        <button class="hidden" id="pauseBtn">Pause</button>
                        <button class="hidden" id="resetBtn">Reset</button>
                    </div>
                </div>
            </div>

            <h2>To-Do List</h2>
            <ul id="todoList"></ul>

            <div>
                <p>Check out my <a href="shortTermMemoryGame.html" target="_blank" rel="noopener noreferrer">Memory Game</a></p>
            </div>
        </div>

        <!-- Notes section -->
        <div class="notes-section" style="display:none">
            <input id="searchBar" placeholder="Search notes" type="text"/>
            <button id="addSubjectBtn">Add Subject</button>
            <ul id="subjectList"></ul>
            <div id="exportButtonContainer">
                <button id="exportbutton">Export</button>
            </div>
            <button id="hideNotes" style="display:none">Hide Notes</button>
        </div>
    </div>

    <script defer src="js/utils.js"></script>
    <script defer src="js/timeSlots.js"></script>
    <script defer src="js/todoList.js"></script>
    <script defer src="js/links.js"></script>
    <script defer src="js/stopwatch.js"></script>
    <script defer src="js/notes.js"></script>

    <script defer>
        document.addEventListener('DOMContentLoaded', function() {
            var btn = document.getElementById('stopwatchToggle');
            var sw  = document.getElementById('inlineStopwatch');
            if (btn && sw) {
                btn.addEventListener('click', function() {
                    var visible = sw.style.display !== 'none';
                    sw.style.display = visible ? 'none' : 'block';
                    btn.classList.toggle('active-icon', !visible);
                });
            }
        });
    </script>
</body>
</html>
